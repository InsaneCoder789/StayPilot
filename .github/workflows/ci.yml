name: StayPilot quality gate

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: staypilot_test
          POSTGRES_USER: staypilot
          POSTGRES_PASSWORD: staypilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U staypilot -d staypilot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://staypilot:staypilot_test@127.0.0.1:5432/staypilot_test?schema=public
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run security:audit
      - run: npm run db:generate
      - run: npm run db:deploy
      - run: npm run db:seed
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
